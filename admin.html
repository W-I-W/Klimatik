<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klimatik — Админ панель</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --fire: #FF4D00;
    --fire-light: #FF7A30;
    --dark: #0E0E0E;
    --dark2: #161616;
    --dark3: #1F1F1F;
    --mid: #2A2A2A;
    --text: #F0EDE8;
    --muted: #888;
    --green: #2ECC71;
    --green-dark: #27AE60;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
  }

  /* LOGIN */
  #login-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: var(--dark);
    position: relative;
  }
  .login-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,77,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,77,0,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .login-box {
    background: var(--dark2);
    border: 1px solid rgba(255,77,0,0.2);
    border-radius: 4px;
    padding: 50px 44px;
    width: 100%; max-width: 420px;
    position: relative;
    z-index: 1;
  }
  .login-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 3px;
    color: var(--fire);
    margin-bottom: 4px;
  }
  .login-logo span { color: var(--text); }
  .login-subtitle {
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 36px;
  }
  .field { margin-bottom: 20px; }
  .field label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    background: var(--dark3);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-size: 1rem;
    padding: 13px 16px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--fire); }
  .login-err {
    color: var(--fire);
    font-size: 0.82rem;
    margin-bottom: 14px;
    display: none;
  }
  .btn-login {
    width: 100%;
    background: var(--fire);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 15px;
    border: none; border-radius: 2px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-login:hover { background: var(--fire-light); }

  /* ADMIN */
  #admin-screen { display: none; }

  header {
    background: var(--dark2);
    border-bottom: 1px solid rgba(255,77,0,0.15);
    padding: 16px 5%;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .admin-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem;
    letter-spacing: 3px;
    color: var(--fire);
  }
  .admin-logo span { color: var(--text); }
  .admin-badge {
    background: rgba(255,77,0,0.12);
    border: 1px solid rgba(255,77,0,0.3);
    color: var(--fire-light);
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 2px;
  }
  .btn-logout {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--muted);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 2px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-logout:hover { border-color: var(--fire); color: var(--fire); }

  .admin-main { padding: 48px 5%; max-width: 900px; margin: 0 auto; }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .page-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 40px; }

  .section-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--fire);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,77,0,0.2);
  }

  .prices-table {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 36px;
  }
  .price-row {
    display: grid;
    grid-template-columns: 2.5rem 1fr 200px 44px;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.2s;
  }
  .price-row:last-child { border-bottom: none; }
  .price-row:hover { background: var(--dark3); }
  .row-icon { font-size: 1.6rem; text-align: center; }
  .row-name { font-weight: 600; font-size: 0.95rem; }
  .row-input {
    background: var(--dark3);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 9px 12px;
    border-radius: 2px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  .row-input:focus { border-color: var(--fire); }
  .row-input.changed { border-color: var(--fire-light); color: var(--fire-light); }
  .btn-reset-row {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted);
    width: 36px; height: 36px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-reset-row:hover { border-color: var(--fire); color: var(--fire); }

  .actions {
    display: flex; gap: 14px; flex-wrap: wrap;
    margin-top: 8px;
  }
  .btn-save {
    background: var(--green);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 14px 32px;
    border: none; border-radius: 2px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-save:hover { background: var(--green-dark); transform: translateY(-1px); }
  .btn-save:active { transform: none; }
  .btn-reset-all {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--muted);
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 14px 28px;
    border-radius: 2px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-reset-all:hover { border-color: var(--fire); color: var(--fire); }

  .toast {
    position: fixed; bottom: 30px; right: 30px;
    background: var(--green);
    color: #fff;
    font-weight: 700;
    font-size: 0.88rem;
    letter-spacing: 1px;
    padding: 14px 24px;
    border-radius: 2px;
    transform: translateY(80px);
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    z-index: 200;
  }
  .toast.show { transform: none; opacity: 1; }

  .preview-link {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--muted);
    font-size: 0.82rem;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 14px 24px;
    border-radius: 2px;
    transition: color 0.2s, border-color 0.2s;
  }
  .preview-link:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }

  @media(max-width: 600px) {
    .price-row { grid-template-columns: 2rem 1fr; grid-template-rows: auto auto; }
    .row-input { grid-column: 1 / -1; }
    .btn-reset-row { display: none; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-grid"></div>
  <div class="login-box">
    <div class="login-logo">Klima<span>tik</span></div>
    <div class="login-subtitle">Панель управления</div>
    <div class="field">
      <label>Логин</label>
      <input type="text" id="inp-login" placeholder="admin" autocomplete="username">
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="login-err" id="login-err">❌ Неверный логин или пароль</div>
    <button class="btn-login" onclick="doLogin()">Войти</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <header>
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="admin-logo">Klima<span>tik</span></div>
      <div class="admin-badge">Админ панель</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="https://w-i-w.github.io/Klimatik/" target="_blank" class="preview-link">🌐 Открыть сайт</a>
      <button class="btn-logout" onclick="doLogout()">Выйти</button>
    </div>
  </header>

  <div class="admin-main">
    <div class="page-title">УПРАВЛЕНИЕ ЦЕНАМИ</div>
    <p class="page-sub">Измените цены и нажмите «Сохранить». Изменения сразу отобразятся на сайте.</p>

    <!-- BOILERS -->
    <div class="section-label">🔥 Газовые котлы</div>
    <div class="prices-table" id="table-boilers"></div>

    <!-- AC -->
    <div class="section-label">❄️ Кондиционеры</div>
    <div class="prices-table" id="table-ac"></div>

    <div class="actions">
      <button class="btn-save" onclick="savePrices()">✓ Сохранить цены</button>
      <button class="btn-reset-all" onclick="resetAll()">↺ Сбросить к исходным</button>
      <a href="https://w-i-w.github.io/Klimatik/" target="_blank" class="preview-link">🌐 Посмотреть сайт</a>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ Цены сохранены!</div>

<script>
  // ── CONFIG ──────────────────────────────────────────
  const ADMIN_LOGIN = 'admin';
  const ADMIN_PASS  = 'klimatik2025';
  const STORAGE_KEY = 'klimatik_prices';

  const SERVICES = [
    {
      table: 'table-boilers',
      items: [
        { id: 'boiler-install', icon: '🔥', name: 'Установка котла',   default: 'от 15 000 ₸' },
        { id: 'boiler-repair',  icon: '🔧', name: 'Ремонт котла',      default: 'от 5 000 ₸'  },
        { id: 'boiler-clean',   icon: '🧹', name: 'Чистка котла',      default: 'от 6 000 ₸'  },
        { id: 'boiler-remove',  icon: '🏗️', name: 'Демонтаж котла',    default: 'от 4 000 ₸'  },
      ]
    },
    {
      table: 'table-ac',
      items: [
        { id: 'ac-install', icon: '❄️', name: 'Установка кондиционера', default: 'от 12 000 ₸' },
        { id: 'ac-repair',  icon: '🛠️', name: 'Ремонт кондиционера',   default: 'от 5 000 ₸'  },
        { id: 'ac-clean',   icon: '🫧', name: 'Чистка кондиционера',    default: 'от 4 000 ₸'  },
        { id: 'ac-remove',  icon: '📦', name: 'Демонтаж кондиционера',  default: 'от 5 000 ₸'  },
      ]
    }
  ];

  // ── AUTH ─────────────────────────────────────────────
  function doLogin() {
    const l = document.getElementById('inp-login').value.trim();
    const p = document.getElementById('inp-pass').value;
    if (l === ADMIN_LOGIN && p === ADMIN_PASS) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      buildTables();
    } else {
      document.getElementById('login-err').style.display = 'block';
    }
  }

  document.getElementById('inp-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogout() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('inp-pass').value = '';
  }

  // ── BUILD TABLES ─────────────────────────────────────
  function getSaved() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
  }

  function buildTables() {
    const saved = getSaved();
    SERVICES.forEach(group => {
      const container = document.getElementById(group.table);
      container.innerHTML = '';
      group.items.forEach(item => {
        const current = saved[item.id] || item.default;
        const row = document.createElement('div');
        row.className = 'price-row';
        row.innerHTML = `
          <div class="row-icon">${item.icon}</div>
          <div class="row-name">${item.name}</div>
          <input class="row-input" data-id="${item.id}" data-default="${item.default}" value="${current}" placeholder="${item.default}">
          <button class="btn-reset-row" title="Сбросить" onclick="resetRow('${item.id}', '${item.default}')">↺</button>
        `;
        container.appendChild(row);
      });
    });

    // Mark changed inputs
    document.querySelectorAll('.row-input').forEach(inp => {
      inp.addEventListener('input', () => {
        inp.classList.toggle('changed', inp.value !== inp.dataset.default);
      });
      // Initial check
      inp.classList.toggle('changed', inp.value !== inp.dataset.default);
    });
  }

  function resetRow(id, def) {
    const inp = document.querySelector(`.row-input[data-id="${id}"]`);
    if (inp) { inp.value = def; inp.classList.remove('changed'); }
  }

  function resetAll() {
    if (!confirm('Сбросить все цены к исходным?')) return;
    document.querySelectorAll('.row-input').forEach(inp => {
      inp.value = inp.dataset.default;
      inp.classList.remove('changed');
    });
  }

  // ── SAVE ─────────────────────────────────────────────
  function savePrices() {
    const prices = {};
    document.querySelectorAll('.row-input').forEach(inp => {
      prices[inp.dataset.id] = inp.value.trim() || inp.dataset.default;
      inp.classList.remove('changed');
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(prices));
    showToast('✓ Цены сохранены!');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
